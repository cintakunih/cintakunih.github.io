<h1>Bitcoin: Mata Uang Digital Masa Depan</h1>

<p>
Bitcoin adalah mata uang digital pertama di dunia yang diperkenalkan pada tahun 2009 oleh seseorang atau kelompok dengan nama samaran Satoshi Nakamoto.
</p>

<img src='https://upload.wikimedia.org/wikipedia/commons/4/46/Bitcoin.svg' />

<p>
Berbeda dengan uang tradisional, Bitcoin tidak dikendalikan oleh pemerintah atau bank pusat. Semua transaksi dicatat dalam teknologi yang disebut blockchain.
</p>

<p>
Keunggulan Bitcoin:
</p>
<ul>
<li>Desentralisasi (tidak dikontrol pihak tertentu)</li>
<li>Transparan</li>
<li>Keamanan tinggi</li>
<li>Bisa digunakan secara global</li>
</ul>

<p>
Namun, Bitcoin juga memiliki risiko seperti volatilitas harga yang tinggi dan potensi penyalahgunaan.
</p>

<p>
Meski begitu, banyak orang percaya bahwa Bitcoin adalah masa depan sistem keuangan digital.
</p>
