<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Iframe Monitor</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: monospace;
    }

    iframe {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      border: none;
    }

    #log {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg,#1e3c72,#2a5298);
      color: #fff;
      padding: 20px;
      overflow-y: auto;
    }

    .ok { color: #00ff9d; }
    .fail { color: #ff4d4d; }
  </style>
</head>
<body>

<div id="log">
  <h2>🚀 Hello World - Iframe Monitor</h2>
  <div id="output"></div>
</div>

<script>
  const URL = "https://www.rotate4all.com/ptp/promote-299681";
  const output = document.getElementById("output");

  function log(msg, type="") {
    const div = document.createElement("div");
    div.className = type;
    div.textContent = "[" + new Date().toLocaleTimeString() + "] " + msg;
    output.appendChild(div);
    output.scrollTop = output.scrollHeight;
  }

  function createIframe(i) {
    const iframe = document.createElement("iframe");
    iframe.src = URL;

    let loaded = false;

    iframe.onload = () => {
      loaded = true;
      log("Iframe " + i + " loaded ✅", "ok");
    };

    // fallback kalau stuck
    setTimeout(() => {
      if (!loaded) {
        log("Iframe " + i + " timeout / blocked ❌", "fail");
      }
    }, 5000);

    document.body.appendChild(iframe);
  }

  // load 10 iframe dengan delay 0.2 detik
  for (let i = 1; i <= 10; i++) {
    setTimeout(() => {
      log("Loading iframe " + i + "...");
      createIframe(i);
    }, i * 200);
  }

</script>

</body>
</html>
