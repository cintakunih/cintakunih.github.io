<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Full Overlay Iframe</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    .layer {
      position: fixed; /* full layar terus */
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    #layer1 {
      z-index: 1;
    }

    #layer2 {
      z-index: 2;
      opacity: 0.7;
    }

    #layer3 {
      z-index: 3;
      opacity: 0.4;
    }
  </style>
</head>
<body>

  <iframe id="layer1" class="layer" src="https://www.rotate4all.com/ptp/promote-299672"></iframe>
  <iframe id="layer2" class="layer" src="https://www.rotate4all.com/ptp/promote-299672"></iframe>
  <iframe id="layer3" class="layer" src="https://www.rotate4all.com/ptp/promote-299672"></iframe>

</body>
</html>
