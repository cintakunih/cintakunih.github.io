<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Hello World</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
    }

    iframe {
      position: absolute;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    #f1 { top: 0; z-index: 1; }
    #f2 { top: 40px; z-index: 2; }
    #f3 { top: 80px; z-index: 3; }
    #f4 { top: 120px; z-index: 4; }

    /* Hello World layer */
    #hello {
      position: absolute;
      top: 160px;
      width: 100%;
      height: calc(100% - 160px);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 40px;
      color: white;
      font-family: sans-serif;
      z-index: 5;
      background: linear-gradient(135deg, #ff7e5f, #feb47b);
    }
  </style>
</head>
<body>

<!-- langsung tampil -->
<div id="hello">Hello World 🚀</div>

<script>
  const sources = [
    "https://www.rotate4all.com/ptp/promote-296617",
    "https://www.rotate4all.com/ptp/promote-299672",
    "https://www.rotate4all.com/ptp/promote-296617",
    "https://www.rotate4all.com/ptp/promote-299672"
  ];

  sources.forEach((src, i) => {
    setTimeout(() => {
      const iframe = document.createElement("iframe");
      iframe.id = "f" + (i + 1);
      iframe.src = src;
      document.body.appendChild(iframe);
    }, i * 500);
  });
</script>

</body>
</html>
