<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Iframe Overlay Test</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<script>
  const sources = [
    "https://www.rotate4all.com/ptp/promote-296617",
    "https://www.rotate4all.com/ptp/promote-299672",
    "https://www.rotate4all.com/ptp/promote-296617",
    "https://www.rotate4all.com/ptp/promote-299672",
    "about:blank"
  ];

  const colors = [
    "rgba(255,0,0,0.2)",
    "rgba(0,255,0,0.2)",
    "rgba(0,0,255,0.2)",
    "rgba(255,255,0,0.2)",
    "linear-gradient(135deg, #ff7e5f, #feb47b)"
  ];

  sources.forEach((src, i) => {
    setTimeout(() => {
      const iframe = document.createElement("iframe");
      iframe.style.zIndex = i + 1;
      iframe.src = src;

      iframe.onload = () => {
        try {
          const doc = iframe.contentDocument || iframe.contentWindow.document;
          doc.open();

          // iframe ke-5 = hello world
          if (i === 4) {
            doc.write(`
              <body style="
                margin:0;
                height:100vh;
                display:flex;
                justify-content:center;
                align-items:center;
                font-size:40px;
                color:white;
                font-family:sans-serif;
                background:${colors[i]};
              ">
                Hello World 🚀
              </body>
            `);
          } else {
            // iframe 1-4 kasih warna overlay
            doc.write(`
              <body style="
                margin:0;
                height:100vh;
                background:${colors[i]};
              ">
              </body>
            `);
          }

          doc.close();
        } catch (e) {
          // kalau situs external block iframe
          iframe.style.background = colors[i];
        }
      };

      document.body.appendChild(iframe);
    }, i * 200);
  });
</script>

</body>
</html>
