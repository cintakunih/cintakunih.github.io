<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Iframe Simple Monitor</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: monospace;
    }

    iframe {
      width: 1px;
      height: 1px;
      opacity: 0;
      border: none;
    }

    #log {
      padding: 20px;
      background: linear-gradient(135deg,#1e3c72,#2a5298);
      color: #fff;
      height: 100%;
    }

    .ok {
      color: #00ff9d;
    }
  </style>
</head>
<body>

<div id="log">
  <h2>🚀 Hello World - Iframe Monitor</h2>
  <div id="output"></div>
</div>

<script>
  const URL = "https://www.rotate4all.com/ptp/promote-299681";
  const output = document.getElementById("output");

  function log(msg) {
    const div = document.createElement("div");
    div.className = "ok";
    div.textContent = "[" + new Date().toLocaleTimeString() + "] " + msg;
    output.appendChild(div);
  }

  function createIframe(i) {
    const iframe = document.createElement("iframe");
    iframe.src = URL;

    iframe.onload = () => {
      log("Iframe " + i + " loaded ✅");
    };

    document.body.appendChild(iframe);
  }

  // 4 iframe dengan delay 0.2 detik
  for (let i = 1; i <= 4; i++) {
    setTimeout(() => {
      createIframe(i);
    }, i * 200);
  }

</script>

</body>
</html>
