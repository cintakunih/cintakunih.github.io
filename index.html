<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Hello World</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<script>
  const colors = [
    "rgba(255,0,0,0.3)",
    "rgba(0,255,0,0.3)",
    "rgba(0,0,255,0.3)",
    "rgba(255,255,0,0.3)",
    "rgba(255,0,255,0.4)"
  ];

  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      const iframe = document.createElement("iframe");
      iframe.style.zIndex = i + 1;

      iframe.onload = () => {
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        doc.open();

        doc.write(`
          <body style="
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:40px;
            color:white;
            font-family:sans-serif;
            background:${colors[i]};
          ">
            IFRAME ${i + 1}
          </body>
        `);

        doc.close();
      };

      iframe.src = "about:blank";
      document.body.appendChild(iframe);
    }, i * 200); // delay 0.2 detik
  }
</script>

</body>
</html>
